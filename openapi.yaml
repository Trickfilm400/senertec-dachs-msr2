openapi: 3.0.0
info:
  title: senertec-dachs-msr2 API
  version: '1.0'
  description: This is a OpenAPI Schema for the SenerTec Dachs MSR2 GLT Module.
  contact:
    url: 'https://github.com/Trickfilm400/senertec-dachs-msr2'
  license:
    name: MIT
servers:
  - url: 'http://localhost:8080'
    description: Localhost
  - url: 'http://<your-ip>:8080'
    description: Prod
paths:
  /getKey:
    parameters: []
    get:
      summary: Get Key Values
      tags: []
      responses:
        '200':
          description: |-
            List of values of the requested keys

            If a key was not found, the following line is returned: `*test=Access denied`
          content:
            text/plain:
              schema:
                type: string
                description: Line-seprarated string with Key=Value pairs
              examples:
                example:
                  value: |-
                    Hka_Bd.ulBetriebssekunden=35289
                    Hka_Bd_Stat.uchSeriennummer=1234567890
                    Hka_Bd_Stat.uchTeilenummer=4700046004
        '401':
          description: Unauthorized
      operationId: get-keys
      description: |-
        Get values by a list of keys given as the query parameter.

        See the full list of query parameter values in the other documentation, as the list is very long.
