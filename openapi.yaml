          in: query
          name: k
          description: Array of keys to fetch values of
          required: true
  /setKeys:
    post:
      summary: Set Keys
      operationId: set-keys
      description: Set values of given keys
      requestBody:
        content:
          text/plain:
            schema:
              type: string
              description: |-
                List of keys with values connected by "&"

                "key1=value1&key2=value2"
            examples:
              example:
                value: Stromf_Ew.Anforderung_GLT.bAktiv=1&Stromf_Ew.Anforderung_GLT.bAnzahlModule=1
        description: |-
          Possible Keys are:

          - Stromf_Ew.Anforderung_GLT.bAktiv
          - Stromf_Ew.Anforderung_GLT.bAnzahlModule
      responses:
        '200':
          description: The result is a list of the keys followed by the status like "ok"
          content:
            text/plain:
              schema:
                type: string
                description: Line separated list
              examples:
                example:
                  value: |-
                    Stromf_Ew.Anforderung_GLT.bAktiv ok
                    Stromf_Ew.Anforderung_GLT.bAnzahlModule ok
        '401':
          description: Unauthorized
    parameters: []
components:
  schemas: {}
  securitySchemes:
    Basic Auth:
      type: http
      scheme: basic
      description: |
        ## Defaults
        Username: `glt`

        Password empty

        ----
security:
  - Basic Auth: []
